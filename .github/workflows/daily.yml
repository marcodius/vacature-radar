name: Dagelijkse vacatures

on:
  schedule:
    # Dagelijks rond 06:17 UTC (~07:17 winter / 08:17 zomer, NL-tijd). Bewust
    # NIET op het hele uur: GitHub stelt cron-runs op :00 vaker uit of slaat ze
    # over (piekdrukte). Een off-peak minuut is betrouwbaarder. GitHub garandeert
    # de tijd sowieso niet exact; workflow_dispatch blijft als handmatige trigger.
    - cron: "17 6 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python 3.12 instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dependencies installeren
        run: python -m pip install -r requirements.txt

      - name: Browser voor JS-rendering installeren
        run: python -m playwright install --with-deps chromium

      - name: Vacatures ophalen
        env:
          # Vul deze in als GitHub Secrets zodra je echte API-toegang hebt.
          # Zonder secrets valt de pijplijn terug op mock-data / overgeslagen bronnen.
          NVB_API_KEY: ${{ secrets.NVB_API_KEY }}
          CSO_API_KEY: ${{ secrets.CSO_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python src/fetch_jobs.py

      - name: Vacatures scoren
        run: python src/score_jobs.py

      - name: Site bouwen
        run: python src/render_site.py

      - name: Pages-artefact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Naar GitHub Pages publiceren
        id: deployment
        uses: actions/deploy-pages@v4

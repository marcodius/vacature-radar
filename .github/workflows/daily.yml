name: Dagelijkse vacatures

on:
  schedule:
    # GitHub-cron is best-effort: runs komen soms uren te laat of vallen weg
    # (op 18-06 liep de 06:17-run pas om 10:46). Daarom MEERDERE pogingen vroeg
    # in de ochtend (UTC), op off-peak minuten: 03:11 / 05:11 / 07:11 UTC
    # (~05:11/07:11/09:11 NL zomer). De 'guard'-job hieronder zorgt dat een latere
    # poging zichzelf overslaat als er die dag (UTC) al een geslaagde run was;
    # bij een mislukte vroege run draait de vangnet-poging wél (retry).
    - cron: "11 3 * * *"
    - cron: "11 5 * * *"
    - cron: "11 7 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  guard:
    # Voorkomt dubbele dagelijkse runs: een latere cron-poging slaat zichzelf
    # over als er die dag (UTC) al een geslaagde run was. Push/handmatig draaien
    # altijd; een mislukte vroege run blokkeert de vangnet-poging niet.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "Event '${{ github.event_name }}': altijd draaien."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          succes=$(gh api "repos/${{ github.repository }}/actions/workflows/daily.yml/runs?per_page=100" \
            --jq "[.workflow_runs[] | select(.conclusion==\"success\") | select(.created_at | startswith(\"$today\"))] | length")
          echo "Geslaagde runs vandaag ($today): ${succes:-0}"
          if [ "${succes:-0}" -ge 1 ]; then
            echo "Er was vandaag al een geslaagde run -> deze poging slaat zichzelf over."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: guard
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: Python 3.12 instellen
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Dependencies installeren
        run: python -m pip install -r requirements.txt

      - name: Browser voor JS-rendering installeren
        run: python -m playwright install --with-deps chromium

      - name: Vacatures ophalen
        env:
          # Vul deze in als GitHub Secrets zodra je echte API-toegang hebt.
          # Zonder secrets valt de pijplijn terug op mock-data / overgeslagen bronnen.
          NVB_API_KEY: ${{ secrets.NVB_API_KEY }}
          CSO_API_KEY: ${{ secrets.CSO_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          # Optioneel: scraping-/proxy-API-sleutel om Indeed ook in CI te laten
          # werken (zet daarnaast "proxy": true in de indeed-bronconfig).
          INDEED_PROXY_KEY: ${{ secrets.INDEED_PROXY_KEY }}
        run: python src/fetch_jobs.py

      - name: Vacatures scoren
        run: python src/score_jobs.py

      - name: Site bouwen
        run: python src/render_site.py

      - name: Pages-artefact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Naar GitHub Pages publiceren
        id: deployment
        uses: actions/deploy-pages@v4
